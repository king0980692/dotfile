"$schema" = "https://starship.rs/config-schema.json"
scan_timeout = 100
command_timeout = 500
follow_symlinks = false
add_newline = false
palette = "custom1"

format = """
$directory\
${custom.giturl}\
$git_branch\
${custom.git_worktree}\
$git_status\
$line_break\
$character\
"""
# right_format disabled: ble.sh can't render starship's right prompt cleanly
# (it redraws it across multiple lines). Keep the prompt single-line.
right_format = ""

[directory]
style = "teal"
format = "[ $path ]($style)"
truncation_length = 4

[directory.substitutions]
"Documents" = "ůįąô "
"Downloads" = "ÔÄô "
"Music" = "Óįõ "
"Pictures" = "ÔÄĺ "
"Developer" = "ůį≤č "
"Others" = "Ôáź "

[username]
disabled = true
show_always = true
style_user = "bg:surface0 fg:text"
style_root = "bg:surface0 fg:text"
format = " $user "

[line_break]
disabled = true

[character]
disabled = false
success_symbol = "[Óě• ](bold fg:green)"
error_symbol = "[‚úė ](bold fg:red)"
vimcmd_symbol = "[: ](bold fg:yellow)"

[package]
disabled = false

[time]
disabled = true
time_format = "%R"
format = "[[ Ôźļ $time ](fg:yellow bg:foam)]($style)"

[custom.giturl]
description = "Display symbol for remote Git server"
command = """
GIT_REMOTE=$(command git ls-remote --get-url 2> /dev/null)
if [[ "$GIT_REMOTE" =~ "github" ]]; then
    GIT_REMOTE_SYMBOL="Ôźą "
elif [[ "$GIT_REMOTE" =~ "gitlab" ]]; then
    GIT_REMOTE_SYMBOL="ÔäĖ "
elif [[ "$GIT_REMOTE" =~ "bitbucket" ]]; then
    GIT_REMOTE_SYMBOL="ÔÖĪ "
elif [[ "$GIT_REMOTE" =~ "git" ]]; then
    GIT_REMOTE_SYMBOL="Ôě° "
else
    GIT_REMOTE_SYMBOL="Ôáí "
fi
echo "$GIT_REMOTE_SYMBOL "
"""
when = "git rev-parse --is-inside-work-tree 2> /dev/null"
format = "$output"
require_repo = true
ignore_timeout = true

[git_branch]
symbol = "[Óā∂](base)Ôźė "
style = "fg:lavender bg:base"
format =  "  [$symbol$branch]($style)[Óāī](base)"

# [git_status]
# MINIMAL git status
# format = " [($all_status$ahead_behind )]($style)"
# ahead    = "‚á°${count} "
# behind   = "‚á£${count} "
# diverged = "‚áē‚á°${ahead_count}‚á£${behind_count} "

[git_status]
format = "[$untracked$staged$modified$renamed$conflicted$ahead_behind ]($style)"
# options available for format
staged     = "[+](green)"
modified   = "[!](yellow)"
renamed    = "[¬Ľ](blue)"
deleted    = "[-](red)"
untracked  = "[?](red)"
stashed    = "[‚Č°](lavender)"
conflicted = "[‚úĖ](red bold)"

ahead      = "[‚á°${count}](teal)"
behind     = "[‚á£${count}](peach)"
diverged   = "[‚áē‚á°${ahead_count}‚á£${behind_count}](mauve)"

[custom.git_worktree]
description = "Show indicator when inside a git worktree"
command = """
if git rev-parse --git-dir >/dev/null 2>&1; then
      common_dir=$(git rev-parse --path-format=absolute --git-common-dir 2>/dev/null)
      git_dir=$(git rev-parse --path-format=absolute --git-dir 2>/dev/null)
      if [ "$common_dir" != "$git_dir" ]; then
            echo "‚õď "
      fi
fi
"""
when = "git rev-parse --is-inside-work-tree >/dev/null 2>&1"
format = " ([$output ]($style))"
style = "bold green"
require_repo = true
ignore_timeout = true


